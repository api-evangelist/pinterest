  contentIds: [String!]
  contentName: String
  numItems: Int
  orderId: String
  searchString: String
}

input CreateWebhookInput {
  deliveryUrl: URL!
  eventTypes: [WebhookEvent!]!
  adAccountId: ID
}

# -----------------------------------------------------------------------
# Root Types
# -----------------------------------------------------------------------

type Query {
  # Pin queries
  pin(id: ID!): Pin
  pinDetails(id: ID!): PinDetails
  pins(boardId: ID!, first: Int, after: String): PinConnection
  savedPins(userId: ID, first: Int, after: String): PinConnection
  pinAnalytics(pinId: ID!, startDate: Date!, endDate: Date!, metrics: [String!]): PinAnalytics
  pinMetrics(pinId: ID!): PinMetrics

  # Board queries
  board(id: ID!): Board
  boardDetails(id: ID!): BoardDetails
  boards(userId: ID, privacy: BoardPrivacy, first: Int, after: String): BoardConnection
  boardSection(boardId: ID!, sectionId: ID!): BoardSection
  boardSections(boardId: ID!): [BoardSection!]
  boardFollowers(boardId: ID!, first: Int, after: String): BoardFollowers

  # User queries
  me: User
  user(username: String!): PublicUser
  userAnalytics(startDate: Date!, endDate: Date!, metrics: [String!]): UserAnalytics

  # Business account queries
  businessAccount(id: ID!): BusinessAccount
  businessAccounts(first: Int, after: String): [BusinessAccount!]

  # Ad account queries
  adAccount(id: ID!): AdAccount
  adAccounts(first: Int, after: String): [AdAccount!]

  # Campaign queries
  campaign(adAccountId: ID!, campaignId: ID!): Campaign
  campaigns(adAccountId: ID!, status: [CampaignStatus!], first: Int, after: String): CampaignConnection
  campaignAnalytics(adAccountId: ID!, campaignId: ID!, startDate: Date!, endDate: Date!): CampaignAnalytics

  # Ad group queries
  adGroup(adAccountId: ID!, adGroupId: ID!): AdGroup
  adGroups(adAccountId: ID!, campaignId: ID!, first: Int, after: String): [AdGroup!]
  adGroupAnalytics(adAccountId: ID!, adGroupId: ID!, startDate: Date!, endDate: Date!): AdGroupAnalytics

  # Ad queries
  ad(adAccountId: ID!, adId: ID!): Ad
  ads(adAccountId: ID!, adGroupId: ID!, first: Int, after: String): [Ad!]

  # Audience queries
  audience(adAccountId: ID!, audienceId: ID!): Audience
  audiences(adAccountId: ID!, first: Int, after: String): [Audience!]
  audienceInsights(adAccountId: ID!, audienceId: ID!): AudienceInsights
  customerList(adAccountId: ID!, customerListId: ID!): CustomerList
  customerLists(adAccountId: ID!): [CustomerList!]
  interests(interestId: ID): [Interest!]

  # Keyword queries
  keywords(adAccountId: ID!, adGroupId: ID!): [Keyword!]
  keywordMetrics(adAccountId: ID!, keywords: [String!]!): [KeywordMetrics!]

  # Catalog queries
  catalogFeed(adAccountId: ID!, feedId: ID!): CatalogFeed
  catalogFeeds(adAccountId: ID!): [CatalogFeed!]
  catalogProduct(catalogId: ID!, itemId: String!): CatalogProduct
  catalogProducts(catalogId: ID!, first: Int, after: String): CatalogProductConnection
  catalogIngestion(catalogId: ID!, ingestionId: ID!): CatalogIngestion
  productGroup(adAccountId: ID!, productGroupId: ID!): ProductGroup
  productGroups(adAccountId: ID!, feedId: ID!): [ProductGroup!]

  # Conversion queries
  conversionTag(adAccountId: ID!, tagId: ID!): ConversionTag
  conversionTags(adAccountId: ID!): [ConversionTag!]
  conversionReport(adAccountId: ID!, startDate: Date!, endDate: Date!): ConversionReport

  # Webhook queries
  webhook(id: ID!): Webhook
  webhooks: [Webhook!]

  # Platform queries
  rateLimit(category: RateLimitCategory!): RateLimit
  rateLimits: [RateLimit!]
}

type Mutation {
  # Pin mutations
  createPin(input: CreatePinInput!): Pin
  updatePin(id: ID!, input: UpdatePinInput!): Pin
  deletePin(id: ID!): Boolean
  savePin(pinId: ID!, boardId: ID!, sectionId: ID): Pin

  # Board mutations
  createBoard(input: CreateBoardInput!): Board
  updateBoard(id: ID!, input: UpdateBoardInput!): Board
  deleteBoard(id: ID!): Boolean
  followBoard(boardId: ID!): Boolean
  unfollowBoard(boardId: ID!): Boolean

  # Board section mutations
  createBoardSection(boardId: ID!, input: CreateBoardSectionInput!): BoardSection
  updateBoardSection(boardId: ID!, sectionId: ID!, input: UpdateBoardSectionInput!): BoardSection
  deleteBoardSection(boardId: ID!, sectionId: ID!): Boolean

  # Campaign mutations
  createCampaign(adAccountId: ID!, input: CreateCampaignInput!): Campaign
  updateCampaign(adAccountId: ID!, campaignId: ID!, input: UpdateCampaignInput!): Campaign
  deleteCampaign(adAccountId: ID!, campaignId: ID!): Boolean

  # Ad group mutations
  createAdGroup(adAccountId: ID!, input: CreateAdGroupInput!): AdGroup
  updateAdGroup(adAccountId: ID!, adGroupId: ID!, input: CreateAdGroupInput!): AdGroup

  # Ad mutations
  createAd(adAccountId: ID!, input: CreateAdInput!): Ad
  updateAd(adAccountId: ID!, adId: ID!, input: UpdateAdInput!): Ad
  deleteAd(adAccountId: ID!, adId: ID!): Boolean

  # Audience mutations
  createAudience(adAccountId: ID!, input: CreateAudienceInput!): Audience
  updateAudience(adAccountId: ID!, audienceId: ID!, input: CreateAudienceInput!): Audience
  createCustomerList(adAccountId: ID!, input: CreateCustomerListInput!): CustomerList
  addCustomerListUsers(adAccountId: ID!, customerListId: ID!, records: String!): CustomerList
  removeCustomerListUsers(adAccountId: ID!, customerListId: ID!, records: String!): CustomerList

  # Catalog mutations
  createCatalogFeed(adAccountId: ID!, input: CreateCatalogFeedInput!): CatalogFeed
  updateCatalogFeed(adAccountId: ID!, feedId: ID!, input: CreateCatalogFeedInput!): CatalogFeed
  deleteCatalogFeed(adAccountId: ID!, feedId: ID!): Boolean

  # Conversion mutations
  createConversionTag(adAccountId: ID!, input: CreateConversionTagInput!): ConversionTag
  sendConversionEvents(adAccountId: ID!, events: [ConversionEventInput!]!): Boolean

  # Webhook mutations
  createWebhook(input: CreateWebhookInput!): Webhook
  deleteWebhook(id: ID!): Boolean

  # User mutations
  followUser(userId: ID!): Boolean
  unfollowUser(userId: ID!): Boolean
}

type Subscription {
  pinSaved(boardId: ID): Pin
  boardUpdated(boardId: ID): Board
  conversionEventReceived(adAccountId: ID!): ConversionEvent
  webhookDelivered(webhookId: ID!): Notification
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
