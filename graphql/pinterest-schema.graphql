type CampaignConnection {
  edges: [CampaignEdge!]!
  pageInfo: PageInfo!
}

type CampaignEdge {
  node: Campaign!
  cursor: String!
}

# -----------------------------------------------------------------------
# Campaign Types
# -----------------------------------------------------------------------

type Campaign implements Node & Timestamped {
  id: ID!
  adAccountId: ID!
  adAccount: AdAccount
