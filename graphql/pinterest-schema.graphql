# Pinterest GraphQL Schema
# Conceptual GraphQL schema derived from the Pinterest REST API v5
# Source: https://developers.pinterest.com/docs/api/v5/

scalar DateTime
scalar Date
scalar JSON
scalar URL

# -----------------------------------------------------------------------
# Enums
# -----------------------------------------------------------------------

enum PinMediaType {
  IMAGE
  VIDEO
  STORY
}

enum BoardPrivacy {
  PUBLIC
  PROTECTED
  SECRET
}

enum CampaignObjective {
  AWARENESS
  CONSIDERATION
  VIDEO_VIEW
  WEB_CONVERSION
  CATALOG_SALES
  APP_INSTALL
}

enum CampaignStatus {
  ACTIVE
  PAUSED
  ARCHIVED
  DRAFT
  DELETED_DRAFT
}

enum AdGroupStatus {
  ACTIVE
  PAUSED
  ARCHIVED
}

enum AdStatus {
  ACTIVE
  PAUSED
  ARCHIVED
  DRAFT
}

enum BidStrategy {
  AUTOMATIC_BID
  MAX_BID
  TARGET_AVG
}

enum AudienceType {
  CUSTOMER_LIST
  VISITOR
  ENGAGEMENT
  ACTALIKE
  INTEREST
}

enum ConversionEventType {
  PAGE_VISIT
  SIGNUP
  CHECKOUT
  CUSTOM
  CART
  LEAD
  SEARCH
  VIEW_CATEGORY
  WATCH_VIDEO
  ADD_TO_CART
}

enum CatalogFeedStatus {
  ACTIVE
  INACTIVE
  DELETED
}

enum CatalogIngestionStatus {
  SUCCESS
  FAILED
  PROCESSING
  QUEUED
}

enum WebhookEvent {
  PIN_SAVE
  BOARD_FOLLOW
  USER_FOLLOW
  CREATE_PIN
  CREATE_BOARD
}

enum Scope {
  PINS_READ
  PINS_WRITE
  BOARDS_READ
  BOARDS_WRITE
  ADS_READ
  ADS_WRITE
  CATALOGS_READ
  CATALOGS_WRITE
  USER_ACCOUNTS_READ
  USER_ACCOUNTS_WRITE
  BILLING_READ
  BILLING_WRITE
  BIZ_ACCESS_READ
  BIZ_ACCESS_WRITE
}

enum RateLimitCategory {
  ORG_READ
  ORG_WRITE
  ORG_ANALYTICS
  ADS_READ
  ADS_WRITE
  ADS_ANALYTICS
  ADS_CONVERSIONS
  CATALOGS_READ
  CATALOGS_WRITE
  TRENDS_READ
  ADVANCED_AUCTION_READ
  ADVANCED_AUCTION_WRITE
}

# -----------------------------------------------------------------------
# Interfaces
# -----------------------------------------------------------------------

interface Node {
  id: ID!
}

interface Timestamped {
  createdAt: DateTime
  updatedAt: DateTime
}

# -----------------------------------------------------------------------
# Pagination
# -----------------------------------------------------------------------

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type PinConnection {
  edges: [PinEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type PinEdge {
  node: Pin!
  cursor: String!
}

type BoardConnection {
  edges: [BoardEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type BoardEdge {
  node: Board!
  cursor: String!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type UserEdge {
  node: PublicUser!
  cursor: String!
}

type CatalogProductConnection {
  edges: [CatalogProductEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

type CatalogProductEdge {
  node: CatalogProduct!
  cursor: String!
}

# -----------------------------------------------------------------------
# Pin Types
# -----------------------------------------------------------------------

type Pin implements Node & Timestamped {
  id: ID!
  title: String
  description: String
  link: URL
  dominantColor: String
  altText: String
  boardId: ID!
  board: Board
  boardSectionId: ID
  boardSection: BoardSection
  creatorId: ID!
  creator: PublicUser
  media: PinMedia
  parentPinId: ID
  note: String
  isOwner: Boolean
  isSaved: Boolean
  isStandard: Boolean
  createdAt: DateTime
  updatedAt: DateTime
}

type PinDetails implements Node & Timestamped {
  id: ID!
  title: String
  description: String
  link: URL
  dominantColor: String
  altText: String
  boardId: ID!
  board: Board
  boardSectionId: ID
  boardSection: BoardSection
  creatorId: ID!
  creator: PublicUser
  media: PinMedia
  parentPinId: ID
  note: String
  isOwner: Boolean
  isSaved: Boolean
  analytics: PinAnalytics
  metrics: PinMetrics
  createdAt: DateTime
  updatedAt: DateTime
}

type PinImage {
  originalUrl: URL
  width: Int
  height: Int
  thumbnailUrl: URL
  x50Url: URL
  x60Url: URL
  x150Url: URL
  x400Url: URL
  x600Url: URL
  x736Url: URL
  x1200Url: URL
}

type PinVideo {
  coverUrl: URL
  duration: Int
  height: Int
  width: Int
  videoUrl: URL
  thumbnailUrl: URL
}

union PinMedia = PinImage | PinVideo

type PinCreative {
  pinId: ID!
  creativeType: String
  imageUrl: URL
  videoUrl: URL
  title: String
  description: String
  callToAction: String
  destinationUrl: URL
}

type PinAd implements Node & Timestamped {
  id: ID!
  adAccountId: ID!
  adGroupId: ID!
  pinId: ID!
  pin: Pin
  status: AdStatus!
  creative: AdCreative
  analytics: PinAnalytics
  createdAt: DateTime
  updatedAt: DateTime
}

type PinAnalytics {
  pinId: ID!
  startDate: Date
  endDate: Date
  impressions: Int
  saves: Int
  clicks: Int
  outboundClicks: Int
  videoViews: Int
  engagements: Int
  engagementRate: Float
  clickThroughRate: Float
  saveRate: Float
}

type PinMetrics {
  pinId: ID!
  allTimeImpressions: Int
  allTimeSaves: Int
  allTimeClicks: Int
  allTimeEngagements: Int
  lifetimeVideoViews: Int
}

type StoryPin implements Node & Timestamped {
  id: ID!
  title: String
  description: String
  boardId: ID!
  board: Board
  creatorId: ID!
  creator: PublicUser
  pageCount: Int
  pages: [StoryPage!]
  createdAt: DateTime
  updatedAt: DateTime
}

type StoryPage {
  pageIndex: Int!
  blocks: [StoryBlock!]
  backgroundColor: String
}

type StoryBlock {
  blockType: String!
  text: String
  imageUrl: URL
  videoUrl: URL
  fontName: String
  textColor: String
  backgroundColor: String
  x: Float
  y: Float
  width: Float
  height: Float
  rotation: Float
}

# -----------------------------------------------------------------------
# Board Types
# -----------------------------------------------------------------------

type Board implements Node & Timestamped {
  id: ID!
  name: String!
  description: String
  owner: PublicUser
  privacy: BoardPrivacy!
  isPinnable: Boolean
  pinCount: Int
  followerCount: Int
  collaboratorCount: Int
  cover: BoardCover
  media: BoardMedia
  sections(first: Int, after: String): BoardSectionConnection
  pins(first: Int, after: String): PinConnection
  followers(first: Int, after: String): UserConnection
  createdAt: DateTime
  updatedAt: DateTime
}

type BoardDetails implements Node & Timestamped {
  id: ID!
  name: String!
  description: String
  owner: PublicUser
  privacy: BoardPrivacy!
  pinCount: Int
  followerCount: Int
  collaboratorCount: Int
  monthlyViews: Int
  cover: BoardCover
  sections: [BoardSection!]
  createdAt: DateTime
  updatedAt: DateTime
}

type BoardSection implements Node {
  id: ID!
  name: String!
  boardId: ID!
  board: Board
  pinCount: Int
  pins(first: Int, after: String): PinConnection
}

type BoardSectionPin {
  sectionId: ID!
  section: BoardSection
  pinId: ID!
  pin: Pin
  addedAt: DateTime
}

type BoardCover {
  imageUrl: URL
  pinId: ID
  pin: Pin
}

type BoardMedia {
  imageCoverUrl: URL
  pinThumbnailUrls: [URL!]
}

type BoardFollowers {
  boardId: ID!
  followers: UserConnection
  totalCount: Int
}

type BoardSectionConnection {
  edges: [BoardSectionEdge!]!
  pageInfo: PageInfo!
}

type BoardSectionEdge {
  node: BoardSection!
  cursor: String!
}

