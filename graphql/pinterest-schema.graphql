  lastName: String
  bio: String
  websiteUrl: URL
  profileImage: URL
  accountType: String
  followerCount: Int
  followingCount: Int
  monthlyViews: Int
  boards(first: Int, after: String): BoardConnection
  pins(first: Int, after: String): PinConnection
  businessAccounts: [BusinessAccount!]
  analytics: UserAnalytics
  createdAt: DateTime
  updatedAt: DateTime
}

type UserProfile {
  userId: ID!
  username: String!
  firstName: String
  lastName: String
  bio: String
  websiteUrl: URL
  profileImage: URL
  followerCount: Int
  followingCount: Int
  boardCount: Int
  pinCount: Int
  monthlyViews: Int
}

type UserAnalytics {
  userId: ID!
