  isAutomatedCampaign: Boolean
  startTime: DateTime
  endTime: DateTime
  adGroups: [AdGroup!]
  analytics: CampaignAnalytics
  createdAt: DateTime
  updatedAt: DateTime
}

type CampaignAnalytics {
  campaignId: ID!
  startDate: Date
  endDate: Date
  impressions: Int
  clicks: Int
  saves: Int
  spend: Float
  cpm: Float
  cpc: Float
  ctr: Float
  conversions: Int
  conversionRate: Float
  roas: Float
}

